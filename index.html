<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkinClash</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 30px;
}

h1 {
    color: #22c55e;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

button {
    margin: 10px;
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: black;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🔥 SkinClash</h1>

<div class="card">
    <p>💰 Баланс: <span id="balance">100</span></p>

    <p>Выбери ставку:</p>
    <button onclick="setBet(10)">10</button>
    <button onclick="setBet(50)">50</button>
    <button onclick="setBet(100)">100</button>

    <p>Текущая ставка: <span id="bet">10</span></p>

    <button onclick="fight()">⚔️ Начать бой</button>
</div>

<script>
let balance = 100;
let bet = 10;

function setBet(amount) {
    bet = amount;
    document.getElementById("bet").innerText = bet;
}

function fight() {
    if (balance < bet) {
        alert("❌ Недостаточно денег");
        return;
    }

    let win = Math.random() < 0.5;

    if (win) {
        balance += bet;
        alert("🎉 Ты выиграл +" + bet);
    } else {
        balance -= bet;
        alert("💀 Ты проиграл -" + bet);
    }

    document.getElementById("balance").innerText = balance;
}
</script>

</body>
</html>
