<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SkinClash</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 20px;
    border-radius: 15px;
}

button {
    padding: 10px;
    margin: 10px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
}

.item {
    margin: 10px;
}
</style>
</head>

<body>

<h1>🔥 SkinClash</h1>

<div class="card">
    💰 Баланс: <span id="balance"></span>
</div>

<div class="card">
    <h2>🎁 Кейсы</h2>
    <button onclick="openCase()">Открыть кейс (50)</button>
    <div id="caseResult"></div>
</div>

<div class="card">
    <h2>🎯 Апгрейд</h2>
    <input id="upgradeValue" placeholder="введите сумму">
    <button onclick="upgrade()">Апгрейд</button>
    <div id="upgradeResult"></div>
</div>

<script>
let balance = localStorage.getItem("balance") || 100;
document.getElementById("balance").innerText = balance;

let items = [
    {name:"AK-47", chance:50, value:20},
    {name:"M4A1", chance:30, value:50},
    {name:"AWP", chance:15, value:100},
    {name:"Knife", chance:5, value:500}
];

function save() {
    localStorage.setItem("balance", balance);
    document.getElementById("balance").innerText = balance;
}

function openCase() {
    if(balance < 50) return alert("Нет денег");

    balance -= 50;

    let rand = Math.random()*100;
    let sum = 0;

    for(let item of items){
        sum += item.chance;
        if(rand <= sum){
            balance += item.value;
            document.getElementById("caseResult").innerText =
                "Выпало: "+item.name+" (+"+item.value+")";
            break;
        }
    }

    save();
}

function upgrade() {
    let value = parseInt(document.getElementById("upgradeValue").value);

    if(balance < value) return alert("Нет денег");

    let chance = 50; // базовый шанс
    let win = Math.random()*100 < chance;

    if(win){
        balance += value;
        document.getElementById("upgradeResult").innerText =
            "🎉 Успех +" + value;
    } else {
        balance -= value;
        document.getElementById("upgradeResult").innerText =
            "💀 Проигрыш -" + value;
    }

    save();
}
</script>

</body>
</html>
